checks:
  helpdesk_email: "acdh-helpdesk@oeaw.ac.at"
  logo_patterns:
    - "acdh-logo"
    - "acdh_logo"
    - "acdh-ch-logo"
    - "acdh.oeaw.ac.at/assets/logo"
  imprint_keywords:
    - "imprint"
