# Kubernetes CronJob manifest for QoS script with Redmine API key support.
# This manifest demonstrates the use of three authentication options:
# - REDMINE_API_KEY: Preferred method (token-based authentication)
# - REDMINE_USER and REDMINE_PSWD: Fallback method (Basic Auth)
# The script will use API key if available; otherwise it falls back to Basic Auth.

apiVersion: batch/v1
kind: CronJob
metadata:
  name: qos-script-update-redmine
  namespace: default
spec:
  # Run daily at 2 AM UTC
  schedule: "0 2 * * *"
  
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: qos-script
          restartPolicy: OnFailure
          
          containers:
          - name: qos-script
            image: qos-script:latest
            imagePullPolicy: Always
            
            env:
            # Rancher configuration
            - name: RANCHER_TOKEN
              valueFrom:
                secretKeyRef:
                  name: qos-script-secrets
                  key: rancher-token
            
            # Redmine authentication - API key (preferred method)
            - name: REDMINE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: qos-script-secrets
                  key: redmine-api-key
                  optional: true  # Optional; fall back to Basic Auth if not set
            
            # Redmine authentication - Basic Auth (fallback method)
            - name: REDMINE_USER
              valueFrom:
                secretKeyRef:
                  name: qos-script-secrets
                  key: redmine-user
                  optional: true
            
            - name: REDMINE_PSWD
              valueFrom:
                secretKeyRef:
                  name: qos-script-secrets
                  key: redmine-password
                  optional: true
            
            # QoS script configuration
            - name: QOS_DRY_RUN
              value: "0"
            
            - name: QOS_MAX_SERVICES
              value: "0"
            
            command:
            - python3
            - scripts/qos-script-update-redmine
            - --rancher
            - --rancherUrl
            - "https://rancher.acdh-dev.oeaw.ac.at/v3"
            - --redmineUrl
            - "https://redmine.acdh.oeaw.ac.at/"
            - --redmineUser
            - "qosScript"
            # Note: --redmineApiKey will be auto-populated from REDMINE_API_KEY env var
            # The script prefers API key over Basic Auth if both are available
            
            resources:
              requests:
                cpu: "100m"
                memory: "256Mi"
              limits:
                cpu: "500m"
                memory: "512Mi"
            
            volumeMounts:
            - name: config
              mountPath: /etc/qos-script
              readOnly: true
          
          volumes:
          - name: config
            configMap:
              name: qos-script-config

---
# Secret manifest (reference; manage through your secrets management system)
apiVersion: v1
kind: Secret
metadata:
  name: qos-script-secrets
  namespace: default
type: Opaque
stringData:
  # Redmine API key (recommended; used if present)
  redmine-api-key: "YOUR_REDMINE_API_KEY_HERE"
  
  # Redmine Basic Auth credentials (used as fallback if no API key is set)
  redmine-user: "qosScript"
  redmine-password: "YOUR_REDMINE_PASSWORD_HERE"
  
  # Rancher token
  rancher-token: "YOUR_RANCHER_TOKEN_HERE"
