replicaCount: 0

# The deploy workflow will substitute $repository and $tag from the built image.
# This avoids using the mutable 'latest' tag and ensures the deployed CronJob
# runs the exact image produced in the previous stage.
image:
  repository: ghcr.io/acdh-oeaw/qos-script/qos-script
  tag: "$tag"
  pullPolicy: Always

ingress:
  enabled: false
livenessProbe:
  enabled: false
readinessProbe:
  enabled: false
startupProbe:
  enabled: false

cronjobs:
  job:
    schedule: "0 8 * * 5" # Adjust the schedule as needed
    image:
      repository: ghcr.io/acdh-oeaw/qos-script/qos-script
      tag: "$tag"
    command: [ "/bin/bash" ]
    args: [ "-c", "python /app/scripts/qos-script-update-redmine --redminePswd $REDMINE_PSWD --rancher --rancherUrl $RANCHER_URL --rancherToken $RANCHER_TOKEN --rancherSkipClusters $SKIP_CLUSTERS --rancherSkipTypes $SKIP_TYPES --verbose" ]
    concurrencyPolicy: Forbid
    failedJobsHistoryLimit: 1
    restartPolicy: OnFailure
    startingDeadlineSeconds: 300
    successfulJobsHistoryLimit: 1
    activeDeadlineSeconds: 3600
    extraEnvFrom:
    - secretRef:
        name: qos-script-master
